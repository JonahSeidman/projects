<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Projects</title>
  <meta name="description" content="A gallery of my projects." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📷</text></svg>" />
</head>
<body>
  <header class="site-header">
    <div class="wrap">
      <h1 class="site-title" id="siteTitle">My Projects</h1>
      <p class="site-subtitle" id="siteSubtitle">A collection of things I've built.</p>
    </div>
  </header>

  <main class="wrap">
    <section id="gallery" class="gallery" aria-label="Project gallery"></section>
    <p id="emptyState" class="empty-state" hidden>
      No photos yet. Drop image files into the <code>images/</code> folder
      and run <code>npm run build</code>.
    </p>
  </main>

  <footer class="site-footer">
    <div class="wrap">
      <p>&copy; <span id="year"></span> · Built with care.</p>
    </div>
  </footer>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox" hidden aria-hidden="true" role="dialog" aria-modal="true">
    <button class="lb-close" id="lbClose" aria-label="Close">&times;</button>
    <button class="lb-nav lb-prev" id="lbPrev" aria-label="Previous">&#10094;</button>
    <figure class="lb-figure">
      <img id="lbImg" src="" alt="" />
      <figcaption id="lbCaption"></figcaption>
    </figure>
    <button class="lb-nav lb-next" id="lbNext" aria-label="Next">&#10095;</button>
  </div>

  <script src="gallery-data.js"></script>
  <script src="script.js"></script>
</body>
</html>
